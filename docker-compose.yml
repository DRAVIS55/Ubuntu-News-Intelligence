version: "3.9"

# African News Intelligence Platform — Docker Compose (Django)
#
# Usage:
#   docker-compose up -d          # start all services
#   docker-compose logs -f app    # tail app logs
#   docker-compose down           # stop all services

services:
  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: anip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: african_news_intel
      POSTGRES_USER: anip_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anip_user -d african_news_intel"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Main Application (Django) ─────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anip-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: core.settings
      DATABASE_URL: postgresql://anip_user:${POSTGRES_PASSWORD:-changeme_in_production}@postgres:5432/african_news_intel
      CHROMA_PATH: /data/chroma_db
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LOCAL_MODEL_PATH: /models/mistral-7b.gguf
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      SECRET_KEY: ${SECRET_KEY:-change-in-production}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-change-in-production}
      DJANGO_ENV: ${DJANGO_ENV:-production}
      DEBUG: "false"
      PORT: 8000
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      LOG_LEVEL: INFO
      INGESTION_INTERVAL_MINUTES: 30
    volumes:
      - chroma_data:/data/chroma_db
      - app_logs:/data/logs
      - models:/models
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Nginx Reverse Proxy (production) ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: anip-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  chroma_data:
    driver: local
  app_logs:
    driver: local
  models:
    driver: local
  nginx_logs:
    driver: local
