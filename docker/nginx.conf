# Nginx config for African News Intelligence Platform (Django)
# Place this at docker/nginx.conf

upstream anip_app {
    server app:8000;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Gzip
    gzip on;
    gzip_types text/plain application/json text/css application/javascript;
    gzip_min_length 1000;

    # Static files (Django collectstatic output)
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # API — pass through to Django
    location /api/ {
        proxy_pass http://anip_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — LLM calls can be slow
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Rate limiting
        limit_req zone=api burst=20 nodelay;
    }

    # Dashboard SPA — serve from Django
    location / {
        proxy_pass http://anip_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # Health check (no rate limit)
    location /api/v1/health {
        proxy_pass http://anip_app;
        access_log off;
    }

    access_log /var/log/nginx/anip_access.log;
    error_log /var/log/nginx/anip_error.log;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
